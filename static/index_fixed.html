<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <!-- Contenido completo del head original -->
    <style>
        :root {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-tertiary: #21262d;
            --border: #30363d; --border-hover: #58a6ff;
            --text-primary: #c9d1d9; --text-secondary: #8b949e; --text-dim: #6e7681;
            --accent: #58a6ff; --accent-hover: #79c0ff;
            --accent-green: #3fb950; --accent-orange: #d29922; --accent-red: #f85149;
            --shadow: rgba(0,0,0,0.3); --radius: 8px; --radius-lg: 12px;
            --font: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            --font-mono: 'SF Mono','Fira Code',Consolas,monospace;
        }
        /* Resto del CSS original */
    </style>
</head>
<body>
    <!-- Contenido completo del body original -->
    <script>
    // Definiciones anteriores
    const $=id=>document.getElementById(id);
    const DE=$('dropZone'),FI=$('fileInput'),fL=$('fileList');
    const ti=$('textInput'),cc=$('cc'),ct=$('ct'),stB=$('stBtn');
    const msgs=$('msgs'),es=$('emptyState'),ci=$('chatInput'),sB=$('sendBtn');
    const ty=$('typing'),th=$('thinking'),thT=$('thinkText');
    const tU=$('tUsed'),tM=$('tMax'),tB=$('tBar');
    const idot=$('indicator'),stT=$('stText'),sD=$('statusDot'),sT2=$('statusText'),mL=$('modelSelect');
    const ctT=$('ctxToggle'),toast=$('toast'),ov=$('overlay'),pt=$('pt');
    const CN=55000,CM=110000,TW=30000;
    let state={dataLoaded:false,tokens:0,maxTokens:CN,streaming:false,models:[]};

    // Añadiendo las funciones faltantes
    function stOn() {
        state.streaming = true;
        sB.disabled = true;
        ci.disabled = true;
    }
    
    function stOff() {
        state.streaming = false;
        sB.disabled = false;
        ci.disabled = false;
        ci.focus();
    }

    // Resto del código original con la corrección para sL
    document.addEventListener('DOMContentLoaded', async () => {
        loadModels();
        checkHealth();
        setInterval(checkHealth, 30000);
        state.maxTokens = CN;
        tM.textContent = CN.toLocaleString();
        sT2.textContent = CN.toLocaleString(); // Corrección: cambiado de sL a sT2
        addSys('Bienvenido! Chatea libremente.');
        addSys('Sube un archivo para analizarlo.');
        loadFiles();
        
        ctT.addEventListener('change', () => {
            state.maxTokens = ctT.checked ? CM : CN;
            upBar(state.tokens, state.maxTokens);
        });
    });
    </script>
</body>
</html>
